<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>用户注册</title>
    <script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <style>
        /* 样式与login.html类似，保持一致 */
        body { font-family: Arial, sans-serif; max-width: 400px; margin: 50px auto; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 8px; box-sizing: border-box; }
        button {
            width: 100%; padding: 10px; background: #28a745;
            color: white; border: none; cursor: pointer;
        }
        button:hover { background: #218838; }
        .message { margin-top: 10px; padding: 10px; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
<h2>用户注册</h2>
<form id="regForm">
    <div class="form-group">
        <label>用户名：</label>
        <input type="text" name="username" required placeholder="3-20位字母数字">
    </div>
    <div class="form-group">
        <label>密码：</label>
        <input type="password" name="password" required placeholder="至少6位">
    </div>
    <div class="form-group">
        <label>邮箱（可选）：</label>
        <input type="email" name="email" placeholder="example@mail.com">
    </div>
    <button type="submit">注册</button>
    <div id="msg"></div>
</form>
<p style="text-align: center;">
    已有账号？<a href="login.html">立即登录</a>
</p>

<script>
    $(document).ready(function() {
        $('#regForm').on('submit', function(e) {
            e.preventDefault();

            // 简单前端校验
            const username = $('input[name="username"]').val();
            const password = $('input[name="password"]').val();

            if (username.length < 3) {
                $('#msg').addClass('error').text('用户名至少3位');
                return;
            }
            if (password.length < 6) {
                $('#msg').addClass('error').text('密码至少6位');
                return;
            }

            // 构建JSON数据
            const data = {
                username: username,
                password: password,
                email: $('input[name="email"]').val() || null
            };

            $.ajax({
                url: './user/register',
                type: 'POST',
                contentType: 'application/json',  // 发送JSON
                data: JSON.stringify(data),
                dataType: 'json',
                success: function(res) {
                    if (res.code === 200) {
                        $('#msg').removeClass('error').addClass('success')
                            .text('注册成功！即将跳转到登录页...');
                        setTimeout(() => {
                            window.location.href = 'login.html';
                        }, 1500);
                    } else {
                        $('#msg').removeClass('success').addClass('error')
                            .text(res.msg);
                    }
                },
                error: function(xhr) {
                    let msg = '请求失败';
                    if (xhr.responseJSON) msg = xhr.responseJSON.msg;
                    $('#msg').addClass('error').text(msg);
                }
            });
        });
    });
</script>
</body>
</html>
